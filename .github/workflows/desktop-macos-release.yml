name: desktop-macos-release

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"
      - "v*"

permissions:
  contents: write

jobs:
  build-macos-desktop:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Cache Rust build outputs
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Generate Tauri icons
        run: npm run desktop:icon

      - name: Build macOS desktop bundle
        run: npm run desktop:build

      - name: Archive app bundle for release upload
        run: ditto -c -k --sequesterRsrc --keepParent src-tauri/target/release/bundle/macos/Stagent.app src-tauri/target/release/bundle/macos/Stagent.app.zip

      - name: Upload macOS desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stagent-macos-desktop
          path: |
            src-tauri/target/release/bundle/macos/Stagent.app.zip
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Attach assets to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/macos/Stagent.app.zip
            src-tauri/target/release/bundle/dmg/*.dmg
          generate_release_notes: true
          draft: false
          prerelease: false
